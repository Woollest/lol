<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>LoL Skill Search - Woollest Edition</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; padding: 20px; }
        .search-box { width: 100%; padding: 15px; font-size: 18px; margin-bottom: 20px; border-radius: 8px; border: none; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .card { background: #1e1e1e; padding: 15px; border-radius: 10px; border: 1px solid #333; }
        .champ-header { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
        .champ-img { width: 50px; height: 50px; border-radius: 50%; border: 2px solid #c89b3c; }
        .skill-item { font-size: 0.9em; background: #2a2a2a; padding: 8px; margin-top: 5px; border-radius: 5px; }
        .highlight { color: #ffcc00; font-weight: bold; }
    </style>
</head>
<body>

    <h1>LoL スキル詳細検索</h1>
    <input type="text" id="searchInput" class="search-box" placeholder="キーワードを入力（例：スタン、復活、シールド...）">
    
    <div id="resultGrid" class="grid"></div>

    <script>
        let championData = {};

        // 1. ローカルのJSONファイルを読み込む
        fetch('championFull.json')
            .then(response => response.json())
            .then(data => {
                championData = data.data;
                console.log("Data Loaded!");
            });

        const input = document.getElementById('searchInput');
        const grid = document.getElementById('resultGrid');

        input.addEventListener('input', () => {
            const query = input.value;
            grid.innerHTML = ''; // 一旦クリア
            if (query.length < 2) return; // 2文字以上で検索開始

            for (let key in championData) {
                const champ = championData[key];
                const allSkills = [champ.passive, ...champ.spells];
                
                // キーワードが含まれるスキルを抽出
                const matchedSkills = allSkills.filter(s => s.description.includes(query));

                if (matchedSkills.length > 0) {
                    const card = document.createElement('div');
                    card.className = 'card';
                    
                    // チャンピオン画像と名前
                    let html = `
                        <div class="champ-header">
                            <img class="champ-img" src="https://ddragon.leagueoflegends.com/cdn/14.5.1/img/champion/${champ.id}.png">
                            <div><strong>${champ.name}</strong><br><small>${champ.title}</small></div>
                        </div>
                    `;

                    // ヒットしたスキルの詳細
                    matchedSkills.forEach(skill => {
                        html += `
                            <div class="skill-item">
                                <span class="highlight">【${skill.name}】</span><br>
                                ${skill.description}
                            </div>
                        `;
                    });

                    card.innerHTML = html;
                    grid.appendChild(card);
                }
            }
        });
    </script>
</body>
</html>
